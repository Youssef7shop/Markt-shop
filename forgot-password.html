<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>استعادة كلمة المرور | Boostify AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="glow-bg glow-1"></div>
    <div class="glow-bg glow-2"></div>
    
    <div class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">Boostify<span class="gradient-text">AI</span></a>
        <h2>هل نسيت كلمة المرور؟</h2>
        <p>لا تقلق، أدخل بريدك الإلكتروني وسنرسل لك رابطاً مباشراً آامناً لإعادة تعيينها فوراً.</p>
      </div>

      <div id="alertBox" class="alert-box hidden"></div>

      <form id="forgotForm" novalidate>
        <div class="input-group">
          <label for="email">البريد الإلكتروني المسجل</label>
          <div class="input-field">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="name@example.com" required>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span>إرسال رابط استعادة المرور</span>
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </form>

      <div class="auth-footer">
        <a href="login.html" class="auth-link"><i class="fa-solid fa-arrow-right"></i> العودة لصفحة تسجيل الدخول</a>
      </div>
    </div>
  </div>

  <script type="module" src="forgot-password.js"></script>
</body>
</html>
