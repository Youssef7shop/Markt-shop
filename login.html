<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boostify AI - بوابة الدخول</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة Supabase السحابية -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- الشعار والترحيب -->
            <div class="auth-brand">
                <i class="fa-solid fa-bolt-lightning brand-icon"></i>
                <h1>Boostify <span>AI</span></h1>
                <p id="auth-subtitle">سجل دخولك للوصول إلى سوق الخدمات الذكية</p>
            </div>

            <!-- أزرار التبديل بين الدخول وحساب جديد -->
            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-login">تسجيل الدخول</button>
                <button class="tab-btn" id="tab-register">حساب جديد</button>
            </div>

            <!-- النموذج البرمجي الموحد -->
            <form id="auth-form" class="flat-form mt-4">
                
                <!-- حقل الاسم (مخفي افتراضياً ويظهر عند اختيار حساب جديد) -->
                <div class="form-group hidden" id="group-fullname">
                    <label for="user-fullname">الاسم الكامل</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="user-fullname" placeholder="مثال: محمد أحمد">
                    </div>
                </div>

                <!-- حقل البريد الإلكتروني -->
                <div class="form-group">
                    <label for="user-email">البريد الإلكتروني</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="user-email" required placeholder="name@example.com">
                    </div>
                </div>

                <!-- حقل كلمة المرور -->
                <div class="form-group">
                    <label for="user-password">كلمة المرور</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="user-password" required minlength="6" placeholder="••••••••">
                    </div>
                </div>

                <!-- زر الإرسال الأساسي -->
                <button type="submit" class="btn-primary-action w-100" id="btn-auth-submit">
                    <i class="fa-solid fa-right-to-bracket"></i> <span id="submit-text">دخول للمنصة</span>
                </button>
            </form>

            <!-- خط فاصل خفيف -->
            <div class="auth-divider">
                <span>أو</span>
            </div>

            <!-- زر تسجيل الدخول السريع عبر Google -->
            <button type="button" class="btn-google-action" id="btn-google-login">
                <i class="fa-brands fa-google" style="color: #ea4335;"></i> تسجيل الدخول بواسطة Google
            </button>

        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
