<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول / حساب جديد | DarkBoost</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo"><i class="fa-solid fa-bolt"></i> DarkBoost</a>
        </div>
    </header>

    <section class="auth-section">
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
                <button class="tab-btn" onclick="switchTab('register')">إنشاء حساب</button>
            </div>

            <!-- نموذج تسجيل الدخول -->
            <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>البريد الإلكتروني:</label>
                    <input type="email" id="login-email" class="form-control" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور:</label>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="add-to-cart-btn">دخول</button>
            </form>

            <!-- نموذج إنشاء حساب -->
            <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>الاسم الكامل:</label>
                    <input type="text" id="reg-name" class="form-control" placeholder="محمد علي" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني:</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label>رقم الهاتف (اختياري):</label>
                    <input type="tel" id="reg-phone" class="form-control" placeholder="+966500000000">
                </div>
                <div class="form-group">
                    <label>كلمة المرور:</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="add-to-cart-btn">إنشاء الحساب</button>
            </form>
        </div>
    </section>

    <script src="auth.js"></script>
</body>
</html>
