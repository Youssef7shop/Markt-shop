<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | Boostify AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="glow-bg glow-1"></div>
    <div class="glow-bg glow-2"></div>
    
    <div class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">Boostify<span class="gradient-text">AI</span></a>
        <h2>مرحباً بعودتك!</h2>
        <p>سجل دخولك لمتابعة إدارة أعمالك الذكية</p>
      </div>

      <div id="alertBox" class="alert-box hidden"></div>

      <form id="loginForm" novalidate>
        <div class="input-group">
          <label for="email">البريد الإلكتروني</label>
          <div class="input-field">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="name@example.com" required>
          </div>
        </div>

        <div class="input-group">
          <div class="label-wrapper">
            <label for="password">كلمة المرور</label>
            <a href="forgot-password.html" class="auth-link small">نسيت كلمة المرور؟</a>
          </div>
          <div class="input-field">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="button" id="togglePassword" class="eye-btn" aria-label="Show password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="auth-options">
          <label class="checkbox-container">
            <input type="checkbox" id="rememberMe">
            <span class="checkmark"></span>
            تذكرني
          </label>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span>تسجيل الدخول</span>
          <i class="fa-solid fa-right-to-bracket"></i>
        </button>
      </form>

      <div class="auth-divider"><span>أو سجل عبر</span></div>

      <div class="oauth-group">
        <button type="button" id="googleLoginBtn" class="btn-oauth">
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
          <span>Google</span>
        </button>
      </div>

      <div class="auth-footer">
        ليس لديك حساب؟ <a href="register.html" class="auth-link">أنشئ حسابك الآن</a>
      </div>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
