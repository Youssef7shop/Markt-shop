<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب جديد | Boostify AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="login.css"> <!-- نعيد استخدام الهيكل الأساسي للتصميم من login.css لتقليل التكرار وتأكيد التطابق بنسبة 100% -->
</head>
<body>
  <div class="auth-wrapper">
    <div class="glow-bg glow-1"></div>
    <div class="glow-bg glow-2"></div>
    
    <div class="auth-container" style="max-width: 600px;"> <!-- تعديل طفيف للمساحة لتستوعب البيانات الإضافية بالتساوي -->
      <div class="auth-header">
        <a href="index.html" class="auth-logo">Boostify<span class="gradient-text">AI</span></a>
        <h2>انضم إلينا اليوم</h2>
        <p>ابدأ رحلتك الرقمية المتطورة مدعومة بالكامل بالذكاء الاصطناعي</p>
      </div>

      <div id="alertBox" class="alert-box hidden"></div>

      <form id="registerForm" novalidate>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;" class="mobile-grid">
          <div class="input-group">
            <label for="fullName">الاسم الكامل</label>
            <div class="input-field">
              <i class="fa-solid fa-user"></i>
              <input type="text" id="fullName" placeholder="عبد الله محمد" required>
            </div>
          </div>
          <div class="input-group">
            <label for="username">اسم المستخدم (Unique)</label>
            <div class="input-field">
              <i class="fa-solid fa-at"></i>
              <input type="text" id="username" placeholder="abdallah99" required>
            </div>
          </div>
        </div>

        <div class="input-group">
          <label for="email">البريد الإلكتروني</label>
          <div class="input-field">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="name@example.com" required>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;" class="mobile-grid">
          <div class="input-group">
            <label for="phone">رقم الهاتف (مع رمز الدولة)</label>
            <div class="input-field">
              <i class="fa-solid fa-phone"></i>
              <input type="tel" id="phone" placeholder="+966500000000" required>
            </div>
          </div>
          <div class="input-group">
            <label for="country">الدولة</label>
            <div class="input-field">
              <i class="fa-solid fa-earth-americas"></i>
              <input type="text" id="country" placeholder="المملكة العربية السعودية" required>
            </div>
          </div>
        </div>

        <div class="input-group">
          <label>نوع الحساب</label>
          <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
            <label class="checkbox-container" style="padding-right: 1.8rem;">
              <input type="radio" name="role" value="client" checked>
              <span class="checkmark" style="border-radius: 50%;"></span>
              عميل (Client)
            </label>
            <label class="checkbox-container" style="padding-right: 1.8rem;">
              <input type="radio" name="role" value="provider">
              <span class="checkmark" style="border-radius: 50%;"></span>
              مقدم خدمة (Provider)
            </label>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;" class="mobile-grid">
          <div class="input-group">
            <label for="password">كلمة المرور</label>
            <div class="input-field">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="password" placeholder="••••••••" required>
            </div>
          </div>
          <div class="input-group">
            <label for="confirmPassword">تأكيد كلمة المرور</label>
            <div class="input-field">
              <i class="fa-solid fa-shield-check"></i>
              <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>
          </div>
        </div>

        <div class="auth-options">
          <label class="checkbox-container">
            <input type="checkbox" id="termsCheck" required>
            <span class="checkmark"></span>
            أوافق على <a href="terms.html" class="auth-link small">شروط الخدمة</a> و <a href="privacy.html" class="auth-link small">سياسة الخصوصية</a>
          </label>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span>إنشاء الحساب</span>
          <i class="fa-solid fa-user-plus"></i>
        </button>
      </form>

      <div class="auth-footer">
        لديك حساب بالفعل؟ <a href="login.html" class="auth-link">تسجيل الدخول</a>
      </div>
    </div>
  </div>

  <style>
    @media(max-width: 550px) {
      .mobile-grid { grid-template-columns: 1fr !important; gap: 0 !important; }
    }
  </style>
  <script type="module" src="register.js"></script>
</body>
</html>
