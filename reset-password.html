<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعيين كلمة المرور الجديدة | Boostify AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="glow-bg glow-1"></div>
    <div class="glow-bg glow-2"></div>
    
    <div class="auth-container">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">Boostify<span class="gradient-text">AI</span></a>
        <h2>تحديث كلمة المرور</h2>
        <p>أدخل كلمة المرور الجديدة القوية لحماية حسابك</p>
      </div>

      <div id="alertBox" class="alert-box hidden"></div>

      <form id="resetForm" novalidate>
        <div class="input-group">
          <label for="newPassword">كلمة المرور الجديدة</label>
          <div class="input-field">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="newPassword" placeholder="••••••••" required>
          </div>
        </div>

        <div class="input-group">
          <label for="confirmNewPassword">تأكيد كلمة المرور الجديدة</label>
          <div class="input-field">
            <i class="fa-solid fa-shield-check"></i>
            <input type="password" id="confirmNewPassword" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span>حفظ كلمة المرور الجديدة</span>
          <i class="fa-solid fa-key-skeleton"></i>
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="reset-password.js"></script>
</body>
</html>
