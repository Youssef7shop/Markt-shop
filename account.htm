<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الحساب | DarkBoost</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo"><i class="fa-solid fa-bolt"></i> DarkBoost</a>
            <div class="nav-actions">
                <button onclick="logout()" class="login-btn" style="background-color: #ff7675; border:none; cursor:pointer;">تسجيل الخروج</button>
            </div>
        </div>
    </header>

    <section class="account-section">
        <div class="container">
            <!-- كروت معلومات المستخدم -->
            <div class="account-grid">
                <div class="account-card">
                    <i class="fa-solid fa-user-gear"></i>
                    <h3 id="user-name">جاري التحميل...</h3>
                    <p id="user-email">...</p>
                </div>
                <div class="account-card">
                    <i class="fa-solid fa-wallet"></i>
                    <h3>رصيد المحفظة</h3>
                    <p id="user-wallet" class="wallet-amount">0.00 $</p>
                </div>
            </div>

            <!-- جدول الطلبات السابقة -->
            <div class="orders-box">
                <h2><i class="fa-solid fa-clock-rotate-left"></i> سجل الطلبات</h2>
                <table class="cart-table" style="margin-top: 20px;">
                    <thead>
                        <tr>
                            <th>رقم الطلب</th>
                            <th>المبلغ الإجمالي</th>
                            <th>حالة الدفع</th>
                            <th>حالة التنفيذ</th>
                            <th>التاريخ</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list">
                        <!-- سيتم تعبئة الطلبات هنا -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <script src="account.js"></script>
</body>
</html>
