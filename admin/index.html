<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم والإدارة | DarkBoost</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: var(--card-bg); border-left: 1px solid #2a2b36; padding: 20px; }
        .sidebar h2 { color: var(--primary-color); margin-bottom: 30px; font-size: 1.5rem; text-align: center; }
        .sidebar-menu a { display: block; padding: 12px 15px; color: var(--text-muted); border-radius: 8px; margin-bottom: 10px; font-weight: bold; }
        .sidebar-menu a.active, .sidebar-menu a:hover { background-color: var(--primary-color); color: #fff; }
        .main-content { flex: 1; padding: 40px; }
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>

    <div class="admin-layout">
        <!-- القائمة الجانبية -->
        <aside class="sidebar">
            <h2><i class="fa-solid fa-user-shield"></i> لوحة الأدمن</h2>
            <nav class="sidebar-menu">
                <a href="#" class="active" onclick="showPanel('products-panel', this)"><i class="fa-solid fa-box"></i> إدارة المنتجات</a>
                <a href="#" onclick="showPanel('orders-panel', this)"><i class="fa-solid fa-list-check"></i> الطلبات الواردة</a>
            </nav>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            
            <!-- قسم إضافة وتصفح المنتجات -->
            <section id="products-panel" class="panel active">
                <h1 class="section-title" style="text-align: right; margin-bottom: 20px;">إضافة خدمة جديدة</h1>
                
                <div class="cart-wrapper" style="margin-bottom: 40px;">
                    <form id="add-product-form" onsubmit="handleAddProduct(event)" class="cart-summary-box" style="width: 100%;">
                        <div class="form-group">
                            <label>اسم الخدمة/المنتج:</label>
                            <input type="text" id="p-name" class="form-control" placeholder="مثال: زيادة متابعين انستقرام" required>
                        </div>
                        <div class="form-group">
                            <label>الاسم اللطيف (Slug):</label>
                            <input type="text" id="p-slug" class="form-control" placeholder="مثال: instagram-followers" required>
                        </div>
                        <div class="form-group">
                            <label>معرف التصنيف (Category ID):</label>
                            <input type="number" id="p-category" class="form-control" placeholder="1" required>
                        </div>
                        <div class="form-group">
                            <label>السعر الأساسي ($):</label>
                            <input type="number" step="0.01" id="p-price" class="form-control" placeholder="5.00" required>
                        </div>
                        <div class="form-group">
                            <label>الوصف:</label>
                            <textarea id="p-desc" class="form-control" rows="3" placeholder="تفاصيل الخدمة ومدة التسليم..."></textarea>
                        </div>
                        <button type="submit" class="add-to-cart-btn"><i class="fa-solid fa-plus"></i> حفظ الخدمة</button>
                    </form>
                </div>
            </section>

            <!-- قسم إدارة الطلبات -->
            <section id="orders-panel" class="panel">
                <h1 class="section-title" style="text-align: right; margin-bottom: 20px;">الطلبات الواردة من العملاء</h1>
                <div class="orders-box">
                    <p style="text-align: center; color: var(--text-muted);">يمكنك متابعة وتنفيذ الطلبات الواردة من هنا.</p>
                </div>
            </section>

        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
