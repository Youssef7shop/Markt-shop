<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boostify AI - سوق الخدمات الذكية</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="app-container">
        <!-- القائمة الجانبية للعميل -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-robot brand-icon"></i>
                <h2>Boostify <span>AI</span></h2>
            </div>
            <nav class="sidebar-menu">
                <a href="index.html" class="menu-item active"><i class="fa-solid fa-store"></i><span>سوق الخدمات</span></a>
                <a href="wallet.html" class="menu-item" id="btn-open-wallet"><i class="fa-solid fa-wallet"></i><span>المحفظة الرقمية</span></a>
                <!-- رابط للإدارة يظهر لاحقاً إذا رغبت ببرمجته للمشرفين فقط، حالياً يمكن تركه -->
                <a href="admin.html" class="menu-item"><i class="fa-solid fa-user-shield"></i><span>لوحة الإدارة</span></a>
                <a href="#" class="menu-item" id="btn-logout" style="color: var(--danger); margin-top: auto;">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i><span>تسجيل الخروج</span>
                </a>
            </nav>
        </aside>

        <!-- المحتوى الرئيسي (السوق) -->
        <main class="main-content">
            <header class="app-header">
                <h3><i class="fa-solid fa-layer-group"></i> استكشف خدمات الذكاء الاصطناعي</h3>
                <div class="user-header-info">
                    <div class="wallet-badge" id="btn-header-wallet">
                        <i class="fa-solid fa-coins"></i> 
                        <span id="user-balance-display">0.00</span>$
                    </div>
                    <span id="user-name-display" class="user-name">جاري التحميل...</span>
                </div>
            </header>

            <div class="dashboard-viewport">
                <!-- أزرار تصفية الفئات -->
                <div class="categories-filter" id="categories-container">
                    <button class="category-btn active" data-id="all">الكل</button>
                    <!-- سيتم حقن الفئات هنا بواسطة JS -->
                </div>

                <!-- شبكة عرض الخدمات -->
                <div class="services-grid" id="services-container">
                    <div class="loading-state">
                        <i class="fa-solid fa-spinner fa-spin"></i> جاري تحميل الخدمات...
                    </div>
                    <!-- سيتم حقن البطاقات هنا -->
                </div>
            </div>
        </main>
    </div>

    <!-- نافذة منبثقة (Modal) لشحن المحفظة -->
    <div class="modal-overlay" id="wallet-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-wallet"></i> شحن المحفظة</h3>
                <button class="close-modal" id="btn-close-wallet"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <p>رصيدك الحالي: <strong id="modal-balance-display" style="color: var(--success);">0.00$</strong></p>
                <div class="form-group mt-4">
                    <label>المبلغ المراد شحنه ($)</label>
                    <input type="number" id="deposit-amount" min="1" step="1" placeholder="مثال: 50">
                </div>
                <button class="btn-primary-action" id="btn-confirm-deposit" style="width: 100%;">
                    <i class="fa-solid fa-bolt"></i> شحن الرصيد الآن
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
