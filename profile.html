<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boostify AI - إعدادات الملف الشخصي</title>
    <!-- استدعاء مباشر من الجذر -->
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="app-container">
        <!-- شريط التنقل الجانبي المستقر -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-bolt brand-icon"></i>
                <h2>Boostify <span>AI</span></h2>
            </div>
            <nav class="sidebar-menu">
                <a href="index.html" class="menu-item"><i class="fa-solid fa-chart-pie"></i><span>الرئيسية</span></a>
                <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-gauge-high"></i><span>لوحة العميل</span></a>
                <a href="profile.html" class="menu-item active"><i class="fa-solid fa-user-gear"></i><span>الملف الشخصي</span></a>
            </nav>
        </aside>

        <!-- المحتوى المركزي للملف الشخصي -->
        <main class="main-content">
            <header class="app-header">
                <h3>إعدادات وتحديث بيانات الملف الشخصي</h3>
            </header>

            <div class="dashboard-viewport">
                <div id="profile-alert" class="alert-box hidden"></div>

                <div class="profile-layout-grid">
                    <!-- كرت التحكم بالصورة الشخصية ورفعها السحابي -->
                    <div class="profile-sidebar-card">
                        <div class="avatar-upload-wrapper">
                            <img id="profile-preview-img" src="https://via.placeholder.com/150" alt="Avatar Preview">
                            <label for="avatar-file-input" class="btn-select-file">
                                <i class="fa-solid fa-camera"></i> تغيير الصورة
                            </label>
                            <input type="file" id="avatar-file-input" accept="image/*" class="hidden">
                        </div>
                        <h4 id="profile-display-username">@username</h4>
                        <p id="profile-display-role" class="role-lbl">Client</p>
                    </div>

                    <!-- نموذج تعديل وحفظ البيانات تفصيلياً (CRUD Update) -->
                    <div class="profile-form-card">
                        <form id="profile-update-form" class="p-form">
                            <div class="form-row-twin">
                                <div class="f-group">
                                    <label>الاسم بالكامل</label>
                                    <input type="text" id="prof-fullname" required>
                                </div>
                                <div class="f-group">
                                    <label>اسم المستخدم (ثابت)</label>
                                    <input type="text" id="prof-username" readonly style="opacity: 0.6; background-color: var(--bg-main);">
                                </div>
                            </div>

                            <div class="form-row-twin">
                                <div class="f-group">
                                    <label>رقم الهاتف الدولي</label>
                                    <input type="tel" id="prof-phone">
                                </div>
                                <div class="f-group">
                                    <label>الدولة</label>
                                    <input type="text" id="prof-country">
                                </div>
                            </div>

                            <div class="f-group">
                                <label>البريد الإلكتروني المسجل</label>
                                <input type="email" id="prof-email" readonly style="opacity: 0.6; background-color: var(--bg-main);">
                            </div>

                            <button type="submit" id="btn-save-profile" class="btn-save-p">
                                <i class="fa-solid fa-floppy-disk"></i> حفظ وتحديث بيانات حسابي
                            </button>
                        </form>

                        <hr class="form-divider">

                        <!-- خيارات تدمير وحذف الحساب الأمنية الصارمة -->
                        <div class="danger-zone">
                            <h5>منطقة الأمان القصوى</h5>
                            <p>عند تأكيد خيار حذف الحساب، سيتم إزالة ومسح كافة المحافظ المالية، سجلات العمليات، والطلبات المرتبطة بك نهائياً وفورياً من خوادم الاستضافة وقاعدة البيانات.</p>
                            <button id="btn-delete-account" class="btn-danger-action">
                                <i class="fa-solid fa-trash-can"></i> حذف وتدمير الحساب بالكامل
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- استدعاء مباشر للملخص البرمجي المجاور -->
    <script type="module" src="profile.js"></script>
</body>
</html>
